name: Combined MSVC Build and Code Analysis

on:
  push:
    branches: [ "master", "action", "msvc" ]
  pull_request:
    branches: [ "master", "action", "msvc" ]

env:
  build: '${{ github.workspace }}/build'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze and Build
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build dependencies
        run: |
          cd ..
          curl -o dhewm3libs.zip https://codeload.github.com/dhewm/dhewm3-libs/zip/refs/heads/master
          unzip dhewm3libs.zip "dhewm3-libs-master/i686-w64-mingw32/**" -x "dhewm3-libs-master/i686-w64-mingw32/share/**"
          curl -o vulkan_headers.zip https://codeload.github.com/KhronosGroup/Vulkan-Headers/zip/refs/heads/master
          unzip vulkan_headers.zip "Vulkan-Headers-master/include/**"
          cp -rv Vulkan-Headers-master/include/* dhewm3-libs-master/i686-w64-mingw32/include/

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -A Win32 -DYQUAKE2LIBS="../dhewm3-libs-master/i686-w64-mingw32/" -S . -B ${{ env.build }}

      # Optional: Uncomment to build before analysis
      # - name: Build CMake
      #   run: cmake --build ${{ env.build }} --config RelWithDebInfo

      - name: Run MSVC Code Analysis
        uses: microsoft/msvc-code-analysis-action@04825f6d9e00f87422d6bf04e1a38b1f3ed60d99
        id: run-analysis
        with:
          cmakeBuildDirectory: ${{ env.build }}
          ruleset: NativeRecommendedRules.ruleset

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.run-analysis.outputs.sarif }}

      # Optional: Upload SARIF as downloadable artifact
      # - name: Upload SARIF as Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: sarif-file
      #     path: ${{ steps.run-analysis.outputs.sarif }}
